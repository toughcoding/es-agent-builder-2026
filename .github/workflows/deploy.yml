name: Deploy Radiation Dashboard to Elastic Cloud

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'elasticsearch/**'
      - 'workflows/**'
      - 'kibana/**'
      - 'agent/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ES_URL: ${{ secrets.ELASTICSEARCH_URL }}
      KB_URL: ${{ secrets.KIBANA_URL }}
      API_KEY: ${{ secrets.DEPLOY_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Index Template ──────────────────────────────
      - name: Deploy Index Template
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "${ES_URL}/_index_template/radiation-dashboard-template" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "Content-Type: application/json" \
            -d @elasticsearch/index-template.json)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "❌ Failed to deploy index template"
            exit 1
          fi
          echo "✅ Index template deployed"

      # ── 2. Bootstrap Write Index ───────────────────────
      - name: Bootstrap Write Index (idempotent)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: ApiKey ${API_KEY}" \
            "${ES_URL}/radiation-dashboard")
          echo "Alias check: HTTP ${STATUS}"

          if [ "$STATUS" = "404" ]; then
            RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              "${ES_URL}/radiation-dashboard-000001" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "Content-Type: application/json" \
              -d @elasticsearch/bootstrap-index.json)

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            echo "HTTP ${HTTP_CODE}: ${BODY}"
            if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
            echo "✅ Bootstrap index created"
          else
            echo "⏭️  Alias already exists, skipping"
          fi

      # ── 3. Agent Builder ───────────────────────────────
      - name: Deploy Radiation Environment Expert Agent
        run: |
          AGENT_ID="radiation-environment-expert"
          AGENT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "kbn-xsrf: true" \
            "${KB_URL}/api/agent_builder/agents/${AGENT_ID}")
          echo "Agent check: HTTP ${AGENT_STATUS}"

          if [ "$AGENT_STATUS" = "200" ]; then
            echo "⏭️  Agent already exists, updating..."
            RESPONSE=$(jq 'del(.id)' agent/radiation-environment-expert.json \
              | curl -s -w "\n%{http_code}" -X PUT \
                "${KB_URL}/api/agent_builder/agents/${AGENT_ID}" \
                -H "Authorization: ApiKey ${API_KEY}" \
                -H "kbn-xsrf: true" \
                -H "Content-Type: application/json" \
                -d @-)
          else
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "${KB_URL}/api/agent_builder/agents" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d @agent/radiation-environment-expert.json)
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
          echo "✅ Agent deployed"

      # ── 4. Elastic Workflow ────────────────────────────
      - name: Deploy Elastic Workflow
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "${KB_URL}/api/workflow/radiation_daily_ingest" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "kbn-xsrf: true" \
            -H "Content-Type: application/yaml" \
            --data-binary @workflows/radiation-daily-ingest.yml)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
          echo "✅ Workflow deployed"

      # ── 5. Workflow Secrets ────────────────────────────
      - name: Configure Workflow Secrets
        env:
          ES_RUNTIME_KEY: ${{ secrets.ES_RUNTIME_API_KEY }}
          GIST_TOKEN: ${{ secrets.GITHUB_GIST_TOKEN }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
            "${KB_URL}/api/workflow/radiation_daily_ingest/secrets" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "kbn-xsrf: true" \
            -H "Content-Type: application/json" \
            -d '{
              "elasticsearch_api_key": "'"${ES_RUNTIME_KEY}"'",
              "github_gist_token": "'"${GIST_TOKEN}"'"
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
          echo "✅ Workflow secrets configured"

      # ── 6. Kibana Dashboard ────────────────────────────
      - name: Deploy Kibana Dashboard
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${KB_URL}/api/saved_objects/_import?overwrite=true" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "kbn-xsrf: true" \
            -F file=@kibana/dashboard.ndjson)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
          echo "✅ Dashboard deployed"