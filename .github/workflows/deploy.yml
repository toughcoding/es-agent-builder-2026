name: Deploy Radiation Dashboard to Elastic Cloud

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'workflows/**'
      - 'kibana/**'
      - 'agent/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ES_URL: ${{ secrets.ELASTICSEARCH_URL }}
      KB_URL: ${{ secrets.KIBANA_URL }}
      API_KEY: ${{ secrets.DEPLOY_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Agent Builder ───────────────────────────────
      - name: Deploy Radiation Environment Expert Agent
        run: |
          AGENT_ID="radiation-environment-expert"
          AGENT_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "kbn-xsrf: true" \
            "${KB_URL}/api/agent_builder/agents/${AGENT_ID}")
          echo "Agent check: HTTP ${AGENT_STATUS}"

          if [ "$AGENT_STATUS" = "200" ]; then
            echo "⏭️  Agent already exists, updating..."
            RESPONSE=$(jq 'del(.id)' agent/radiation-environment-expert.json \
              | curl -s -w "\n%{http_code}" -X PUT \
                "${KB_URL}/api/agent_builder/agents/${AGENT_ID}" \
                -H "Authorization: ApiKey ${API_KEY}" \
                -H "kbn-xsrf: true" \
                -H "Content-Type: application/json" \
                -d @-)
          else
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "${KB_URL}/api/agent_builder/agents" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "kbn-xsrf: true" \
              -H "Content-Type: application/json" \
              -d @agent/radiation-environment-expert.json)
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
          echo "✅ Agent deployed"

      # ── 2. Elastic Workflow: Deploy ────────────────────
      - name: Deploy Elastic Workflow
        env:
          GIST_TOKEN: ${{ secrets.GITHUB_GIST_TOKEN }}
        run: |
          # Read YAML and inject the Gist token
          YAML_WITH_SECRET=$(sed "s|github_gist_token_placeholder|${GIST_TOKEN}|g" \
            workflows/radiation-daily-ingest.yml)

          # Build JSON payload
          echo "$YAML_WITH_SECRET" | jq -Rs '{"yaml": .}' > /tmp/workflow-payload.json

          echo "Payload size: $(wc -c < /tmp/workflow-payload.json) bytes"

          # Search for existing workflow
          SEARCH_RESULT=$(curl -s -X POST \
            "${KB_URL}/api/workflows/search" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "Content-Type: application/json" \
            -H "kbn-xsrf: true" \
            -H "x-elastic-internal-origin: Kibana" \
            -d '{"limit":100,"page":1,"query":"radiation_daily_ingest"}')

          echo "Search result: $(echo "$SEARCH_RESULT" | jq -r '.results | length // 0') workflows found"

          WORKFLOW_ID=$(echo "$SEARCH_RESULT" | jq -r '
            [.results[] | select(.name == "radiation_daily_ingest")] | first | .id // empty' \
            2>/dev/null || true)

          if [ -n "$WORKFLOW_ID" ]; then
            echo "Updating existing workflow: ${WORKFLOW_ID}"
            RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT \
              "${KB_URL}/api/workflows/${WORKFLOW_ID}" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "Content-Type: application/json" \
              -H "kbn-xsrf: true" \
              -H "x-elastic-internal-origin: Kibana" \
              -d @/tmp/workflow-payload.json)
          else
            echo "Creating new workflow"
            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "${KB_URL}/api/workflows" \
              -H "Authorization: ApiKey ${API_KEY}" \
              -H "Content-Type: application/json" \
              -H "kbn-xsrf: true" \
              -H "x-elastic-internal-origin: Kibana" \
              -d @/tmp/workflow-payload.json)
          fi

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
          echo "✅ Workflow deployed"

          rm -f /tmp/workflow-payload.json

      # ── 3. Kibana Dashboard ────────────────────────────
      - name: Deploy Kibana Dashboard
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${KB_URL}/api/saved_objects/_import?overwrite=true" \
            -H "Authorization: ApiKey ${API_KEY}" \
            -H "kbn-xsrf: true" \
            -H "x-elastic-internal-origin: Kibana" \
            -F file=@kibana/dashboard.ndjson)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "$HTTP_CODE" -ge 400 ]; then exit 1; fi
          echo "✅ Dashboard deployed"