name: radiation_daily_ingest
enabled: true
description: >
  Daily workflow: fetch Ukraine radiation data from three government JS sources,
  invoke AI agent to parse, merge, index into Elasticsearch,
  perform expert radiation analysis, and publish report to GitHub Gist.

# ─── Triggers ──────────────────────────────────────────────────
triggers:
  - type: scheduled
    with:
      rrule:
        freq: DAILY
        interval: 1
        byhour: [15]
        byminute: [0]
        tzid: UTC
        dtstart: 2026-02-27T15:00:00Z
  - type: manual

# ─── Consts ──────────────────────────────────────────────────
consts:
  github_gist_token: "github_gist_token_placeholder"
  indexName: radiation-dashboard

# ─── Steps ─────────────────────────────────────────────────────
steps:

  # ── Step 1: Check if index exists ──────────────────────────
  - name: check_index
    type: elasticsearch.indices.exists
    with:
      index: "{{ consts.indexName }}"

  # ── Step 2: Create index if it doesn't exist ───────────────
  - name: handle_index
    type: if
    condition: 'steps.check_index.output : true'
    steps:
      - name: index_exists
        type: console
        with:
          message: "Index {{ consts.indexName }} already exists. Skipping creation."
    else:
      - name: index_not_found
        type: console
        with:
          message: "Index {{ consts.indexName }} not found. Creating..."
      - name: create_index
        type: elasticsearch.indices.create
        with:
          index: "{{ consts.indexName }}"
          mappings:
            properties:
              "@timestamp":            { type: date }
              station_id:              { type: integer }
              station_name:            { type: keyword }
              location:                { type: geo_point }
              altitude_m:              { type: integer }
              has_weather_station:     { type: boolean }
              has_radiation_station:   { type: boolean }
              radiation_urh:           { type: float }
              radiation_nsvh:          { type: float }
              radiation_missing:       { type: boolean }

  # ── Step 3: Fetch radiation measurements ───────────────────
  - name: fetch_radioday
    type: http
    with:
      url: https://www.meteo.gov.ua/_/m/radioday.js
      method: GET
      headers:
        Referer: "https://www.meteo.gov.ua/en/"
        Accept: "*/*"

  # ── Step 4: Fetch radiation station metadata ───────────────
  - name: fetch_radio_posts
    type: http
    with:
      url: https://www.meteo.gov.ua/en/_radio-posts.js
      method: GET
      headers:
        Referer: "https://www.meteo.gov.ua/en/"
        Accept: "*/*"

  # ── Step 5: Fetch meteorological station metadata ──────────
  - name: fetch_meteo_stations
    type: http
    with:
      url: https://www.meteo.gov.ua/en/_meteo-stations.js
      method: GET
      headers:
        Referer: "https://www.meteo.gov.ua/en/"
        Accept: "*/*"

  - name: log_results
    type: console
    with:
      message: |-
        "Input to LLM engine below:"
        {{ steps.fetch_radioday.output.data | json }}
        {{ steps.fetch_radio_posts.output.data }}
        {{ steps.fetch_meteo_stations.output.data }}


  # ── Step 6: AI Agent — parse, merge, produce NDJSON + report ─
  - name: ai_produce_ndjson
    type: ai.agent
    with:
      agent_id: "radiation-environment-expert"
      message: >
        You have three JavaScript source files containing Ukraine radiation
        monitoring data. Your task is to parse them, merge them, and return
        ONLY the NDJSON bulk body for Elasticsearch indexing.

        ## SOURCE DATA (raw JavaScript — NOT pure JSON)

        ### radioday.js (radiation measurements):

        {{ steps.fetch_radioday.output.data | json }}

        ### radio-posts.js (radiation station metadata):

        {{ steps.fetch_radio_posts.output.data }}


        ### meteo-stations.js (meteorological station metadata):

        {{ steps.fetch_meteo_stations.output.data }}


        ## PARSING INSTRUCTIONS

        Each file defines a JavaScript constant: `const VARIABLE_NAME = { ... };`
        To parse: remove the `const VARIABLE_NAME =` prefix and trailing `;`,
        then treat the remainder as JSON.

        - radioday.js: key = station ID, fields: CD (date DD.MM.YYYY),
          CH (time HH:mm:ss), VR (µR/h), VZ (nSv/h)
        - radio-posts.js: `const RADIO_POSTS = {...}` — key = station ID,
          fields: P (name), X (lat), Y (lon), H (altitude)
        - meteo-stations.js: `const METEO_STATIONS = {...}` — field `i` is
          the WMO station ID (NOT the outer key), t (name), x (lat string),
          y (lon string), h (altitude)


        ## MERGE LOGIC
           
           1. Build a station dictionary keyed by station_id (WMO ID)
           2. Add all radiation stations from radio-posts (object key = station_id)
           3. Merge meteorological stations using field `i` as join key
           4. For each station: if radioday has a measurement → attach values;
              if not and it's a radiation station → set radiation_missing=true
           5. Combine CD + CH into ISO8601 with Europe/Warsaw timezone
              (+01:00 winter, +02:00 summer)
           6. Document _id = stationId_YYYY-MM-DD (for idempotent re-runs)
           
           
           ## TARGET DOCUMENT STRUCTURE
           
           {
             "@timestamp": "ISO8601 with timezone",
             "station_id": integer,
            "station_name": "string",
            "location": { "lat": float, "lon": float },
            "altitude_m": integer,
            "has_weather_station": boolean,
            "has_radiation_station": boolean,
            "radiation_urh": float or null,
            "radiation_nsvh": float or null,
            "radiation_missing": boolean
         
           
        ## YOUR OUTPUT FORMAT

        Return ONLY raw NDJSON lines. Nothing else.
        No markers. No report. No explanation. No code blocks. No backticks.
        
        Each station = exactly 2 lines:
        {"index":{"_index":"radiation-dashboard","_id":"33345_2026-02-26"}}
        {"@timestamp":"2026-02-26T20:00:00+01:00","station_id":33345,...}

        Start output immediately with the first {"index":...} line.
        End output immediately after the last document JSON line.


  # ── Step 7: Bulk index — pass agent output directly ────────
  - name: bulk_index
    type: elasticsearch.request
    with:
      method: POST
      path: /radiation-dashboard/_bulk
      headers:
        Content-Type: application/x-ndjson
      body: |
        {{ steps.ai_produce_ndjson.output.message }}

  # ── Step 8: Log bulk result ────────────────────────────────
  - name: log_bulk
    type: console
    with:
      message: "Bulk errors: {{ steps.bulk_index.output.data.errors }}"

    #── Step 9: AI Agent — analyze indexed data + report ───────
  - name: ai_analyze
    type: ai.agent
    with:
      agent_id: "radiation-environment-expert"
      message: >
        The radiation data has been indexed into the radiation-dashboard index.
        Please query the index for today's data and produce your complete
        Markdown radiation situation report for Ukraine.

  # ── Step 10: Publish report to GitHub Gist ──────────────────
  - name: publish_gist
    type: http
    with:
     url: https://api.github.com/gists
     method: POST
     headers:
       Accept: application/vnd.github+json
       Authorization: "Bearer {{ consts.github_gist_token }}"
       X-GitHub-Api-Version: "2022-11-28"
       Content-Type: application/json
     body: |
       {
         "description": "Ukraine Radiation Report",
         "public": true,
         "files": {
           "radiation-report.md": {
             "content": {{ steps.ai_analyze.output.message | json }}
           }
         }
       }